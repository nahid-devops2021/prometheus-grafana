global:
  resolve_timeout: 5m

route:
  receiver: telegram-notifications
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: telegram-notifications
    telegram_configs:
      - bot_token_file: /run/secrets/telegram_bot_token
        chat_id:
        api_url: https://api.telegram.org
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>{{ if eq .Status "firing" }}🔥 FIRING{{ else }}✅ RESOLVED{{ end }}: {{ .CommonLabels.alertname }}</b>

          {{ range .Alerts }}
          <b>Instance:</b> {{ .Labels.instance }}
          <b>Server:</b> {{ .Labels.server }}
          <b>Severity:</b> {{ .Labels.severity }}
          <b>Summary:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ if eq .Status "resolved" }}<b>Ended:</b> {{ .EndsAt.Format "2006-01-02 15:04:05" }}{{ end }}
          {{ end }}
